<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코드 발급</title>
<style>
  :root {
    --bg: #14101d;
    --panel: #1e1830;
    --accent: #7c3aed;
    --accent-soft: #a78bfa;
    --text: #eae6f5;
    --muted: #8b83a3;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 0%, #241a3d 0%, var(--bg) 60%);
    font-family: "Segoe UI", "Pretendard", -apple-system, sans-serif;
    color: var(--text);
  }
  .card {
    background: var(--panel);
    border: 1px solid #2f2650;
    border-radius: 16px;
    padding: 40px;
    width: 360px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(124, 58, 237, 0.15);
  }
  h1 {
    font-size: 20px;
    margin: 0 0 8px;
    letter-spacing: 0.02em;
  }
  p.sub {
    color: var(--muted);
    font-size: 13px;
    margin: 0 0 28px;
  }
  .code-display {
    font-family: "Consolas", monospace;
    font-size: 28px;
    letter-spacing: 4px;
    background: #100c1c;
    border: 1px dashed #3d3163;
    border-radius: 10px;
    padding: 18px 8px;
    margin-bottom: 20px;
    min-height: 68px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent-soft);
    word-break: break-all;
  }
  .code-display.placeholder {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: normal;
  }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  button:hover { background: #6d28d9; }
  button:active { transform: scale(0.98); }
  .hint {
    margin-top: 16px;
    font-size: 12px;
    color: var(--muted);
  }
  .copied {
    color: var(--accent-soft);
  }
</style>
</head>
<body>
  <div class="card">
    <h1>코드 발급</h1>
    <p class="sub">버튼을 누르면 12자리 코드가 발급됩니다</p>
    <div class="code-display placeholder" id="codeBox">아직 발급된 코드가 없습니다</div>
    <button id="genBtn">코드 발급받기</button>
    <div class="hint" id="hint">발급된 코드를 디스코드에 입력하세요</div>
  </div>

<script>
  const genBtn = document.getElementById('genBtn');
  const codeBox = document.getElementById('codeBox');
  const hint = document.getElementById('hint');

  genBtn.addEventListener('click', async () => {
    genBtn.disabled = true;
    genBtn.textContent = '발급 중...';
    try {
      const res = await fetch('/api/generate', { method: 'POST' });
      const data = await res.json();
      codeBox.textContent = data.code;
      codeBox.classList.remove('placeholder');
      hint.textContent = '클릭하면 복사됩니다';
      hint.classList.remove('copied');
    } catch (e) {
      codeBox.textContent = '오류가 발생했습니다';
    }
    genBtn.disabled = false;
    genBtn.textContent = '새 코드 발급받기';
  });

  codeBox.addEventListener('click', () => {
    if (codeBox.classList.contains('placeholder')) return;
    navigator.clipboard.writeText(codeBox.textContent);
    hint.textContent = '복사되었습니다!';
    hint.classList.add('copied');
  });
</script>
</body>
</html>
